name: test

on:
  push: {}

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    env:
      CGO_ENABLED: 0
      GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Lint and test code
        run: make lint test

      - name: Record benchmark
        run: make benchmark

      - name: Execute Trivy scan
        run: make trivy
