name: test

on:
  push: {}

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:4f5382f4d8a5d0f7e109258b86200f2cc6e9fb76758ed4c8c404a1e8df4b68ea
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/go-openssl/go-openssl

      - name: Lint and test code
        run: make lint test

      - name: Record benchmark
        run: make benchmark

      - name: Execute Trivy scan
        run: make trivy
