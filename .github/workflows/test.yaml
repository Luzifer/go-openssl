name: test

on:
  push: {}

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:a511c8f8c84804ec9d9641daa9f994858e4a80a57744ce88c669227a84f1d500
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/go-openssl/go-openssl

      - name: Lint and test code
        run: make lint test

      - name: Record benchmark
        run: make benchmark

      - name: Execute Trivy scan
        run: make trivy
